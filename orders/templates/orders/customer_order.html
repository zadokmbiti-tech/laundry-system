<!DOCTYPE html>
<html>
<head>
    <title>Place Laundry Order</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: url("https://images.unsplash.com/photo-1581578731548-c64695cc6952?auto=format&fit=crop&w=1600&q=80") no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .order-card {
            background: white;
            width: 800px;
            max-width: 95%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .services {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 8px;
            background: #fafafa;
        }

        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }

        .service-info {
            flex: 1;
        }

        .quantity {
            width: 60px;
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            margin-left: 10px;
        }

        .submit-btn {
            width: 100%;
            background: #007BFF;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="overlay">
    <div class="order-card">
        <h2>Place Laundry Order</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Customer Name</label>
                <input type="text" name="customer_name" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" name="phone_number" required>
            </div>

            <h3>Select Services</h3>
            <div class="services">
                {% for service in services %}
                <div class="service-item">
                    <div class="service-info">
                        <label>
                            <input type="checkbox" name="services" value="{{ service.id }}">
                            {{ service.name }} — KES {{ service.price }}
                        </label>
                    </div>
                    <input
                        class="quantity"
                        type="number"
                        name="quantity_{{ service.id }}"
                        value="1"
                        min="1">
                </div>
                {% endfor %}
            </div>

            <button type="submit" class="submit-btn">
                Continue to Payment
            </button>
        </form>
    </div>
</div>

</body>
</html>
