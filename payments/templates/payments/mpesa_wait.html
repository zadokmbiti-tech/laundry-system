<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiting for M-Pesa Payment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        .spinner {
            width: 60px; height: 60px;
            border: 5px solid #e8f5e9;
            border-top: 5px solid #4caf50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 1.4rem; color: #1a1a2e; margin-bottom: 12px; }
        p { color: #666; font-size: 0.95rem; line-height: 1.6; }
        .phone { font-weight: 700; color: #4caf50; }
        #status-msg {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }
        .success { background: #e8f5e9; color: #2e7d32; display: block !important; }
        .failed  { background: #fff0f0; color: #c0392b; display: block !important; }
        .retry-btn {
            display: none;
            margin-top: 16px;
            padding: 12px 24px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="spinner" id="spinner"></div>
    <h2>Check Your Phone</h2>
    <p>
        An M-Pesa prompt has been sent to<br>
        <span class="phone">{{ order.phone_number }}</span><br><br>
        Enter your M-Pesa PIN to complete payment for Order #{{ order.id }}.
    </p>
    <div id="status-msg"></div>
    <a href="{% url 'payments:payment_page' order.id %}" class="retry-btn" id="retry-btn">Try Again</a>
</div>

<script>
    const orderId = {{ order.id }};
    let attempts = 0;
    const maxAttempts = 24; // poll for 2 minutes (24 × 5s)

    function checkStatus() {
        fetch(`/payments/mpesa/status/${orderId}/`)
            .then(r => r.json())
            .then(data => {
                attempts++;
                const msg = document.getElementById('status-msg');
                const spinner = document.getElementById('spinner');
                const retryBtn = document.getElementById('retry-btn');

                if (data.status === 'success') {
                    spinner.style.display = 'none';
                    msg.textContent = `✅ Payment successful! Receipt: ${data.receipt}`;
                    msg.className = 'success';
                    // Redirect to receipt after 2 seconds
                    setTimeout(() => {
                        window.location.href = `/payments/receipt/${orderId}/`;
                    }, 2000);

                } else if (data.status === 'failed') {
                    spinner.style.display = 'none';
                    msg.textContent = '❌ Payment failed or cancelled. Please try again.';
                    msg.className = 'failed';
                    retryBtn.style.display = 'inline-block';

                } else if (attempts >= maxAttempts) {
                    spinner.style.display = 'none';
                    msg.textContent = '⏱ Timed out. Please try again.';
                    msg.className = 'failed';
                    retryBtn.style.display = 'inline-block';

                } else {
                    setTimeout(checkStatus, 5000); // poll every 5 seconds
                }
            })
            .catch(() => {
                if (attempts < maxAttempts) setTimeout(checkStatus, 5000);
            });
    }

    // Start polling after 5 seconds
    setTimeout(checkStatus, 5000);
</script>
</body>
</html>
